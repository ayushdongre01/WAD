<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>Facebook</title>
    </head>

    <body>

        <div class="container-fluid navb">
            <div class="row align-items-center">
                <div class="col-md-6 title mt-3 ml-3">
                    <h1 class="ms-4 fw-bolder">facebook</h1>
                </div>
                <div class="col-md-6">
                    <div class="d-flex align-items-start justify-content-end gap-2">
                        <div>
                            <label for="">Email or username</label>
                            <input class="form-control form-control-sm" type="email" placeholder="Email">
                            <div class="small-text">
                                <input type="checkbox">Keep me logged in
                            </div>
                        </div>

                        <div>
                            <label for="">Password</label>
                            <input class="form-control form-control-sm" type="password" placeholder="Password">
                            <div>
                                <p class="small-text">Forgotten my password</p>
                            </div>
                        </div>

                        <button class="btn btn-light btn-sm mt-4">
                            Login
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h2>Facebook is useless without Friends.</h2>
                    <h2>Make more friends</h2>
                    <img src="../7/face.png" alt="">
                </div>

                <div class="col-md-6">
                    <div class="ms-3">
                        <h2>Create an account</h2>
                        <h4>It's free and always will be</h4>
                        <form>
                            <div class="row mb-2">
                                <div class="col">
                                    <input class="form-control" type="text" placeholder="Firstname">
                                </div>
                                <div class="col">
                                    <input class="form-control" type="text" placeholder="Lastname">
                                </div>
                            </div>
                            <input class="form-control mb-2" type="email" placeholder="Email">
                            <input class="form-control mb-2" type="email" placeholder="Re-enter email">
                            <input class="form-control mb-2" type="password" placeholder="Password">
                            <input class="form-control mb-2" type="date">
                            <div class="mb-2">
                                <input type="radio"> Male
                                <input type="radio" class="ms-2"> Female
                            </div>
                        </form>
                        <p class="terms">By clicking create an account you agree to our terms</p>
                    <button class="btn btn-success">Signup</button>
                    <hr>
                    <p>Create page for you.</p>
                    </div>

                    
                </div>
            </div>
        </div>


        <script src="script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
