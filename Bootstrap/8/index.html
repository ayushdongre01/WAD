<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Event Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container mt-5">
        <div class="form-box">

            <h2 class="text-center mb-4">Event Registration</h2>

            <form class="needs-validation" novalidate>

                <!-- Name -->
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="name" placeholder="Name" required
                        data-bs-toggle="tooltip" title="Enter your full name">
                    <label for="name">Full Name</label>
                    <div class="invalid-feedback">Name is required</div>
                </div>

                <!-- Email -->
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" placeholder="Email" required
                        data-bs-toggle="tooltip" title="Enter valid email">
                    <label for="email">Email address</label>
                    <div class="invalid-feedback">Valid email required</div>
                </div>

                <!-- Phone -->
                <div class="form-floating mb-3">
                    <input type="tel" class="form-control" id="phone" placeholder="Phone" required
                        data-bs-toggle="tooltip" title="Enter phone number">
                    <label for="phone">Phone Number</label>
                    <div class="invalid-feedback">Phone required</div>
                </div>

                <!-- Event -->
                <div class="form-floating mb-3">
                    <select class="form-select" required>
                        <option value="">Select</option>
                        <option>Workshop</option>
                        <option>Seminar</option>
                        <option>Hackathon</option>
                    </select>
                    <label>Event Type</label>
                    <div class="invalid-feedback">Select event</div>
                </div>

                <!-- Submit -->
                <button class="btn btn-primary w-100">Register</button>

            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
