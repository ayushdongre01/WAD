<div class="container">
  <h2>To-Do List</h2>

  <!-- Input with two-way binding -->
  <input type="text" [(ngModel)]="newTask" placeholder="Enter task">

  <!-- Add / Update button -->
  <button *ngIf="editIndex === -1" (click)="addTask()">Add</button>
  <button *ngIf="editIndex !== -1" (click)="updateTask()">Update</button>

  <ul>
    <li *ngFor="let task of tasks; let i = index">
      {{ task }}
      <button (click)="editTask(i)">Edit</button>
      <button (click)="deleteTask(i)">Delete</button>
    </li>
  </ul>
</div>
